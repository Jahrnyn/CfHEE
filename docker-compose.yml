services:
  postgres:
    image: postgres:16
    container_name: cfhee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cfhee
      POSTGRES_USER: cfhee
      POSTGRES_PASSWORD: cfhee
    ports:
      - "5432:5432"
    volumes:
      - ./apps/backend/sql:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
